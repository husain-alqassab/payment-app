apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'openshift-sandbox'
        environment: 'development'

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Payment application metrics - static configuration
      - job_name: 'payment-app'
        metrics_path: '/metrics'
        scrape_interval: 30s
        static_configs:
          - targets: ['payment-app:8080']