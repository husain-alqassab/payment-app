<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="payment-form">
            <h1>Payment Generator</h1>
            <p class="subtitle">Generate a new payment request</p>
            
            <form id="paymentForm">
                <div class="form-group">
                    <label for="customerName">Customer Name *</label>
                    <input type="text" id="customerName" name="customerName" required 
                           placeholder="Enter customer name">
                </div>

                <div class="form-group">
                    <label for="amount">Amount *</label>
                    <input type="number" id="amount" name="amount" required 
                           placeholder="0.00" step="0.01" min="0">
                </div>

                <div class="form-group">
                    <label for="currency">Currency *</label>
                    <select id="currency" name="currency" required>
                        <option value="">Select currency</option>
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="CAD">CAD - Canadian Dollar</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" 
                              placeholder="Enter payment description (optional)"></textarea>
                </div>

                <button type="submit" class="btn-submit">Generate Payment</button>
            </form>

            <div id="result" class="result hidden">
                <h2>Payment Generated Successfully!</h2>
                <div class="payment-details">
                    <p><strong>Payment ID:</strong> <span id="paymentId"></span></p>
                    <p><strong>Customer:</strong> <span id="resultCustomer"></span></p>
                    <p><strong>Amount:</strong> <span id="resultAmount"></span></p>
                    <p><strong>Status:</strong> <span id="resultStatus"></span></p>
                    <p><strong>Created:</strong> <span id="resultCreated"></span></p>
                    <p><strong>Expires:</strong> <span id="resultExpires"></span></p>
                </div>
                <button class="btn-new" onclick="resetForm()">Generate New Payment</button>
            </div>

            <div id="error" class="error hidden"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
